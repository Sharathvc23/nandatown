# SPDX-License-Identifier: Apache-2.0
# Concurrent-writers scenario: 8 agents race to write the same key, each with
# its own LWW-Register CRDT replica, and gossip to convergence under loss.
name: memory_concurrent_writers
description: "8 agents write one shared key under 10% message drop; CRDT merge converges."

tier: 1
seed: 42

agents:
  count: 8
  brain: state-machine
  roles:
    - name: writer
      count: 8

layers:
  transport: in_memory
  comms: nest_native
  identity: did_key
  registry: in_memory
  auth: jwt
  trust: score_average
  payments: prepaid_credits
  coordination: contract_net
  negotiation: alternating_offers
  memory: lww_register
  privacy: noop
  datafacts: datafacts_v1

task:
  type: memory_concurrent_writers
  config:
    rounds: 20
    key: shared

failures:
  message_drop: 0.1

duration: "ticks: 100000"

metrics:
  - message_count
  - agent_count

output:
  trace: ./traces/memory_concurrent_writers.jsonl
