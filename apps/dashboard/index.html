<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEST Dashboard</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg: #ffffff;
  --bg-alt: #fafafa;
  --bg-card: #ffffff;
  --bg-hover: #f5f5f5;
  --border: #e5e5e5;
  --border-light: #f0f0f0;
  --text: #111111;
  --text-secondary: #555555;
  --text-muted: #999999;
  --red: #8B0000;
  --red-light: #a52a2a;
  --red-bg: rgba(139,0,0,0.06);
  --red-border: rgba(139,0,0,0.15);
  --green: #1a7a3a;
  --blue: #2563eb;
  --gold: #b8860b;
  --silver: #6b7280;
  --bronze: #a0522d;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Header */
.header {
  background: #111111;
  color: #ffffff;
  padding: 18px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.header h1 span { color: var(--red-light); }
.header-meta { font-size: 13px; color: #888; }

/* Upload */
.upload-container {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 60px);
  padding: 40px;
}
.upload-zone {
  width: 100%;
  max-width: 560px;
  padding: 64px 48px;
  border: 2px dashed var(--border);
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--bg);
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--red);
  background: var(--red-bg);
}
.upload-zone h2 { font-size: 20px; margin-bottom: 10px; font-weight: 600; }
.upload-zone p { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
.upload-zone .btn {
  display: inline-block;
  padding: 10px 32px;
  background: var(--red);
  color: #fff;
  border-radius: 6px;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  border: none;
  transition: background 0.2s;
}
.upload-zone .btn:hover { background: var(--red-light); }
.upload-zone input[type="file"] { display: none; }

/* Dashboard */
.dashboard { display: none; }
.dashboard.active { display: block; padding-bottom: 48px; }

/* Summary cards */
.summary-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  padding: 20px 32px;
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 18px;
  transition: box-shadow 0.2s;
}
.card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card .label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
  font-weight: 600;
}
.card .value { font-size: 24px; font-weight: 700; color: var(--text); }
.card .value.red { color: var(--red); }
.card .value.green { color: var(--green); }

/* Tabs */
.tabs-container { padding: 0 32px; margin-top: 4px; }
.tabs {
  display: flex;
  border-bottom: 2px solid var(--border-light);
  gap: 0;
}
.tab {
  padding: 12px 24px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
  user-select: none;
}
.tab:hover { color: var(--text-secondary); }
.tab.active { color: var(--red); border-bottom-color: var(--red); }

.tab-panel { display: none; padding: 20px 0; }
.tab-panel.active { display: block; }

/* Containers */
.panel-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin: 0 32px;
  overflow: hidden;
}
.panel-box svg { display: block; }

/* Legend */
.legend {
  display: flex;
  gap: 20px;
  padding: 10px 32px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
}
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* Timeline */
.timeline-event { cursor: pointer; }
.timeline-event circle { transition: r 0.12s; }
.timeline-event:hover circle { r: 6; }

/* Tooltip */
.tooltip {
  position: fixed;
  pointer-events: none;
  background: #111;
  color: #fff;
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 12px;
  line-height: 1.6;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  z-index: 1000;
  display: none;
  max-width: 280px;
}
.tooltip .tt-kind {
  font-weight: 700;
  text-transform: uppercase;
  font-size: 10px;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.tooltip .tt-row { color: #ccc; }
.tooltip .tt-row b { color: #fff; }

/* Graph */
.graph-node text {
  fill: var(--text);
  font-size: 11px;
  font-weight: 600;
  pointer-events: none;
}

/* Table */
.table-wrapper { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 16px; text-align: left; font-size: 13px; }
th {
  background: var(--bg-alt);
  color: var(--text-muted);
  font-weight: 700;
  text-transform: uppercase;
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  user-select: none;
  position: sticky;
  top: 0;
  border-bottom: 1px solid var(--border);
}
th:hover { color: var(--text-secondary); }
th .sort-arrow { margin-left: 4px; font-size: 10px; }
td { border-bottom: 1px solid var(--border-light); color: var(--text-secondary); }
tr:hover td { background: var(--red-bg); }

/* Metrics */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
  margin: 0 32px;
}
.metric-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
}
.metric-card .metric-title {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  font-weight: 700;
}
.metric-card .metric-value { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.metric-card .metric-detail { font-size: 12px; color: var(--text-muted); }

/* Benchmark & Leaderboard */
.benchmark-section { margin: 0 32px; }
.benchmark-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.benchmark-header h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}
.benchmark-actions { display: flex; gap: 8px; }
.btn-sm {
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-sm:hover { border-color: var(--red); color: var(--red); }
.btn-sm.primary {
  background: var(--red);
  color: #fff;
  border-color: var(--red);
}
.btn-sm.primary:hover { background: var(--red-light); }

/* Leaderboard */
.leaderboard-table { width: 100%; border-collapse: collapse; }
.leaderboard-table th {
  background: #111;
  color: #fff;
  padding: 12px 16px;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 700;
  text-align: left;
  border-bottom: none;
}
.leaderboard-table td {
  padding: 12px 16px;
  font-size: 13px;
  border-bottom: 1px solid var(--border-light);
}
.leaderboard-table tr:hover td { background: var(--red-bg); }
.rank-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-weight: 800;
  font-size: 12px;
}
.rank-1 { background: #fef3c7; color: var(--gold); }
.rank-2 { background: #f3f4f6; color: var(--silver); }
.rank-3 { background: #fed7aa; color: var(--bronze); }
.rank-other { background: var(--bg-alt); color: var(--text-muted); }
.score-bar-bg {
  width: 100%;
  height: 6px;
  background: var(--border-light);
  border-radius: 3px;
  overflow: hidden;
}
.score-bar {
  height: 100%;
  background: var(--red);
  border-radius: 3px;
  transition: width 0.4s ease;
}
.run-name { font-weight: 600; color: var(--text); }
.run-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.badge {
  display: inline-block;
  padding: 2px 8px;
  font-size: 10px;
  font-weight: 700;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.badge-pass { background: #dcfce7; color: var(--green); }
.badge-warn { background: #fef9c3; color: var(--gold); }
.badge-fail { background: #fee2e2; color: var(--red); }

/* Compare panel */
.compare-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.compare-card {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}
.compare-card h4 {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.compare-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 13px;
  border-bottom: 1px solid var(--border-light);
}
.compare-row:last-child { border-bottom: none; }
.compare-label { color: var(--text-secondary); }
.compare-value { font-weight: 600; }
.compare-better { color: var(--green); }
.compare-worse { color: var(--red); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-alt); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 768px) {
  .summary-row { grid-template-columns: repeat(2, 1fr); }
  .compare-grid { grid-template-columns: 1fr; }
  .header { padding: 14px 16px; }
  .tabs-container, .panel-box, .metrics-grid,
  .benchmark-section, .legend { padding-left: 16px; padding-right: 16px; margin-left: 16px; margin-right: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <h1><span>NEST</span> Dashboard</h1>
  <div class="header-meta" id="header-meta"></div>
</div>

<!-- Upload -->
<div class="upload-container" id="upload-screen">
  <div class="upload-zone" id="drop-zone">
    <h2>Load Trace File</h2>
    <p>Drag and drop a .jsonl trace file, or click to browse</p>
    <button class="btn" id="browse-btn">Select File</button>
    <input type="file" id="file-input" accept=".jsonl,.json,.ndjson" multiple>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="summary-row" id="summary-cards"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Send</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div> Receive</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Dropped</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div> Broadcast</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--text-muted)"></div> Start / Stop</div>
  </div>

  <div class="tabs-container">
    <div class="tabs">
      <div class="tab active" data-tab="timeline">Timeline</div>
      <div class="tab" data-tab="graph">Message Flow</div>
      <div class="tab" data-tab="table">Agent Stats</div>
      <div class="tab" data-tab="metrics">Metrics</div>
      <div class="tab" data-tab="benchmark">Benchmark</div>
      <div class="tab" data-tab="leaderboard">Leaderboard</div>
    </div>
  </div>

  <div class="tab-panel active" id="panel-timeline">
    <div class="panel-box" id="timeline-container"></div>
  </div>

  <div class="tab-panel" id="panel-graph">
    <div class="panel-box" id="graph-container"></div>
  </div>

  <div class="tab-panel" id="panel-table">
    <div class="panel-box">
      <div class="table-wrapper">
        <table id="agent-table"><thead><tr></tr></thead><tbody></tbody></table>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="panel-metrics">
    <div class="metrics-grid" id="metrics-grid"></div>
  </div>

  <div class="tab-panel" id="panel-benchmark">
    <div class="benchmark-section" id="benchmark-section"></div>
  </div>

  <div class="tab-panel" id="panel-leaderboard">
    <div class="benchmark-section" id="leaderboard-section"></div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
(function() {
  "use strict";

  const COLORS = {
    send: "#1a7a3a",
    receive: "#2563eb",
    dropped: "#8B0000",
    broadcast: "#7c3aed",
    start: "#999999",
    stop: "#999999"
  };

  let parsedTrace = null;
  const allRuns = [];

  // ── File handling ──
  const dropZone = document.getElementById("drop-zone");
  const fileInput = document.getElementById("file-input");
  const browseBtn = document.getElementById("browse-btn");

  browseBtn.addEventListener("click", e => { e.stopPropagation(); fileInput.click(); });
  dropZone.addEventListener("click", () => fileInput.click());
  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("drag-over");
    for (const f of e.dataTransfer.files) loadFile(f);
  });
  fileInput.addEventListener("change", () => {
    for (const f of fileInput.files) loadFile(f);
  });

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = e => parseAndRender(e.target.result, file.name);
    reader.readAsText(file);
  }

  const INJECTED_TRACE = "__NEST_TRACE_DATA__";
  if (INJECTED_TRACE !== "__NEST_" + "TRACE_DATA__") {
    try { parseAndRender(INJECTED_TRACE, "injected-trace.jsonl"); } catch(e) {}
  }

  function parseAndRender(text, filename) {
    const lines = text.trim().split("\n").filter(l => l.trim());
    const events = [];
    for (const line of lines) {
      try { events.push(JSON.parse(line)); } catch(e) {}
    }
    if (!events.length) { alert("No valid events found."); return; }

    const trace = analyzeTrace(events);
    trace.filename = filename;
    trace.timestamp = new Date().toISOString();

    allRuns.push(trace);
    parsedTrace = trace;

    document.getElementById("upload-screen").style.display = "none";
    document.getElementById("dashboard").classList.add("active");
    document.getElementById("header-meta").textContent =
      filename + " — " + events.length + " events";
    renderAll();
  }

  // ── Analysis ──
  function analyzeTrace(events) {
    const agents = new Set();
    const agentStats = {};
    let sends = 0, receives = 0, dropped = 0, broadcasts = 0;
    let minTs = Infinity, maxTs = -Infinity;
    const correlations = {};

    for (const ev of events) {
      const a = ev.agent;
      agents.add(a);
      if (!agentStats[a]) agentStats[a] = {
        sends: 0, receives: 0, dropped: 0, broadcasts: 0,
        firstTs: Infinity, lastTs: -Infinity
      };
      const s = agentStats[a];
      if (ev.ts < s.firstTs) s.firstTs = ev.ts;
      if (ev.ts > s.lastTs) s.lastTs = ev.ts;
      if (ev.ts < minTs) minTs = ev.ts;
      if (ev.ts > maxTs) maxTs = ev.ts;

      if (ev.kind === "send") { sends++; s.sends++; }
      else if (ev.kind === "receive") { receives++; s.receives++; }
      else if (ev.kind === "dropped") { dropped++; s.dropped++; }
      else if (ev.kind === "broadcast") { broadcasts++; s.broadcasts++; }

      if (ev.corr) {
        if (!correlations[ev.corr]) correlations[ev.corr] = [];
        correlations[ev.corr].push(ev);
      }
    }

    const latencies = [];
    for (const evs of Object.values(correlations)) {
      const se = evs.find(e => e.kind === "send");
      const re = evs.find(e => e.kind === "receive");
      if (se && re) latencies.push(re.ts - se.ts);
    }

    const totalMessages = sends + broadcasts;
    const deliveredMessages = receives;
    const successRate = totalMessages > 0 ? deliveredMessages / totalMessages : 1;
    const meanLatency = latencies.length > 0 ? latencies.reduce((a,b)=>a+b,0)/latencies.length : 0;
    const duration = maxTs - minTs;
    const throughput = duration > 0 ? totalMessages / duration : 0;

    const edges = {};
    for (const ev of events) {
      if (ev.kind === "send" && ev.to) {
        const key = ev.agent + "->" + ev.to;
        edges[key] = (edges[key] || 0) + 1;
      }
    }

    const score = computeScore(successRate, meanLatency, throughput, dropped, totalMessages);

    return {
      events, agents: [...agents].sort(), agentStats, correlations,
      sends, receives, dropped, broadcasts,
      minTs, maxTs, duration,
      latencies, meanLatency, successRate, throughput,
      edges, totalMessages, deliveredMessages, score
    };
  }

  function computeScore(successRate, meanLatency, throughput, dropped, total) {
    const sr = successRate * 40;
    const lat = Math.max(0, 20 - meanLatency * 5);
    const tp = Math.min(20, throughput * 2);
    const dr = total > 0 ? Math.max(0, 20 - (dropped / total) * 100) : 20;
    return Math.round(Math.min(100, sr + lat + tp + dr));
  }

  function percentile(arr, p) {
    if (!arr.length) return 0;
    const sorted = [...arr].sort((a, b) => a - b);
    return sorted[Math.max(0, Math.ceil(p * sorted.length) - 1)];
  }

  // ── Render ──
  function renderAll() {
    renderSummaryCards();
    renderTimeline();
    renderGraph();
    renderTable();
    renderMetrics();
    renderBenchmark();
    renderLeaderboard();
  }

  function renderSummaryCards() {
    const p = parsedTrace;
    const cards = [
      { label: "Events", value: p.events.length },
      { label: "Agents", value: p.agents.length },
      { label: "Messages", value: p.sends + p.broadcasts },
      { label: "Success Rate", value: (p.successRate*100).toFixed(1)+"%", cls: p.successRate>=0.9?"green":"red" },
      { label: "Duration", value: p.duration.toFixed(1)+" t" },
      { label: "Dropped", value: p.dropped, cls: p.dropped>0?"red":"" },
      { label: "Score", value: p.score+"/100", cls: p.score>=70?"green":"red" },
    ];
    document.getElementById("summary-cards").innerHTML = cards.map(c =>
      `<div class="card"><div class="label">${c.label}</div><div class="value ${c.cls||''}">${c.value}</div></div>`
    ).join("");
  }

  // ── Tooltip ──
  const tooltip = document.getElementById("tooltip");
  function showTooltip(ev, x, y) {
    let html = `<div class="tt-kind" style="color:${COLORS[ev.kind]||'#999'}">${ev.kind}</div>`;
    html += `<div class="tt-row"><b>Agent:</b> ${ev.agent}</div>`;
    html += `<div class="tt-row"><b>Time:</b> ${ev.ts}</div>`;
    if (ev.to) html += `<div class="tt-row"><b>To:</b> ${ev.to}</div>`;
    if (ev.from) html += `<div class="tt-row"><b>From:</b> ${ev.from}</div>`;
    if (ev.size != null) html += `<div class="tt-row"><b>Size:</b> ${ev.size}</div>`;
    if (ev.corr) html += `<div class="tt-row"><b>Corr:</b> ${ev.corr}</div>`;
    tooltip.innerHTML = html;
    tooltip.style.display = "block";
    const rect = tooltip.getBoundingClientRect();
    let left = x + 14, top = y - 10;
    if (left + rect.width > window.innerWidth - 10) left = x - rect.width - 14;
    if (top + rect.height > window.innerHeight - 10) top = y - rect.height + 10;
    if (top < 10) top = 10;
    tooltip.style.left = left + "px";
    tooltip.style.top = top + "px";
  }
  function hideTooltip() { tooltip.style.display = "none"; }

  // ── Timeline ──
  function renderTimeline() {
    const container = document.getElementById("timeline-container");
    container.innerHTML = "";
    const p = parsedTrace;
    const agents = p.agents;

    const margin = { top: 30, right: 30, bottom: 40, left: 110 };
    const rowH = Math.max(22, Math.min(34, 600/agents.length));
    const height = margin.top + margin.bottom + agents.length*rowH;
    const width = Math.max(800, container.clientWidth || 800);
    const innerW = width - margin.left - margin.right;
    const innerH = height - margin.top - margin.bottom;

    const svg = d3.select(container).append("svg")
      .attr("width", width).attr("height", height);
    const g = svg.append("g").attr("transform",
      `translate(${margin.left},${margin.top})`);

    const xScale = d3.scaleLinear().domain([p.minTs, p.maxTs]).range([0, innerW]);
    const yScale = d3.scaleBand().domain(agents).range([0, innerH]).padding(0.3);

    // Grid
    g.selectAll(".grid").data(xScale.ticks(15)).enter()
      .append("line")
      .attr("x1", d=>xScale(d)).attr("x2", d=>xScale(d))
      .attr("y1", 0).attr("y2", innerH)
      .attr("stroke", "#e5e5e5").attr("stroke-opacity", 0.7);

    // Agent rows
    g.selectAll(".row").data(agents).enter()
      .append("rect")
      .attr("x", 0).attr("y", d=>yScale(d))
      .attr("width", innerW).attr("height", yScale.bandwidth())
      .attr("fill", (d,i) => i%2===0 ? "#fafafa" : "transparent");

    // Axes
    g.append("g").attr("transform", `translate(0,${innerH})`)
      .call(d3.axisBottom(xScale).ticks(15).tickFormat(d=>d+"t"))
      .selectAll("text,line,path")
      .attr("fill", "#999").attr("stroke", "#999");

    g.append("g").call(d3.axisLeft(yScale))
      .selectAll("text").attr("fill", "#555")
      .style("font-size", "11px").style("font-weight", "500");
    g.select(".domain").remove();
    g.selectAll(".tick line").remove();

    // Correlation lines
    for (const evs of Object.values(p.correlations)) {
      const se = evs.find(e => e.kind==="send"||e.kind==="broadcast");
      const re = evs.find(e => e.kind==="receive");
      if (se && re) {
        g.append("line")
          .attr("x1", xScale(se.ts))
          .attr("y1", yScale(se.agent)+yScale.bandwidth()/2)
          .attr("x2", xScale(re.ts))
          .attr("y2", yScale(re.agent)+yScale.bandwidth()/2)
          .attr("stroke", "#ddd").attr("stroke-width", 1);
      }
      const de = evs.find(e => e.kind==="dropped");
      if (se && de) {
        g.append("line")
          .attr("x1", xScale(se.ts))
          .attr("y1", yScale(se.agent)+yScale.bandwidth()/2)
          .attr("x2", xScale(de.ts))
          .attr("y2", yScale(de.agent)+yScale.bandwidth()/2)
          .attr("stroke", var_red).attr("stroke-width", 1)
          .attr("stroke-dasharray", "4,3").attr("stroke-opacity", 0.5);
      }
    }

    // Dots
    const maxDots = 10000;
    let display = p.events;
    if (display.length > maxDots) {
      const imp = display.filter(e => e.kind==="start"||e.kind==="stop"||e.kind==="dropped");
      const rest = display.filter(e => e.kind!=="start"&&e.kind!=="stop"&&e.kind!=="dropped");
      const step = Math.ceil(rest.length / (maxDots - imp.length));
      display = imp.concat(rest.filter((_, i) => i%step===0));
    }

    g.selectAll(".timeline-event").data(display).enter()
      .append("g").attr("class", "timeline-event")
      .attr("transform", d =>
        `translate(${xScale(d.ts)},${yScale(d.agent)+yScale.bandwidth()/2})`)
      .each(function(d) {
        const el = d3.select(this);
        if (d.kind==="start"||d.kind==="stop") {
          el.append("rect").attr("x",-3).attr("y",-3)
            .attr("width",6).attr("height",6).attr("rx",1)
            .attr("fill", COLORS[d.kind]);
        } else {
          el.append("circle").attr("r", 3.5)
            .attr("fill", COLORS[d.kind]||"#999");
        }
      })
      .on("mouseover", (event, d) => showTooltip(d, event.clientX, event.clientY))
      .on("mousemove", (event, d) => showTooltip(d, event.clientX, event.clientY))
      .on("mouseout", hideTooltip);
  }

  const var_red = "#8B0000";

  // ── Graph ──
  function renderGraph() {
    const container = document.getElementById("graph-container");
    container.innerHTML = "";
    const p = parsedTrace;

    const width = container.clientWidth || 800;
    const height = Math.max(500, Math.min(700, p.agents.length*35));

    const svg = d3.select(container).append("svg")
      .attr("width", width).attr("height", height);

    svg.append("defs").append("marker")
      .attr("id", "arrow").attr("viewBox", "0 -5 10 10")
      .attr("refX", 22).attr("refY", 0)
      .attr("markerWidth", 6).attr("markerHeight", 6)
      .attr("orient", "auto")
      .append("path").attr("d", "M0,-5L10,0L0,5")
      .attr("fill", var_red);

    const totalByAgent = {};
    for (const a of p.agents) {
      const s = p.agentStats[a];
      totalByAgent[a] = s.sends + s.receives + s.broadcasts;
    }
    const maxTotal = Math.max(1, ...Object.values(totalByAgent));
    const nodes = p.agents.map(a => ({
      id: a, total: totalByAgent[a],
      r: Math.max(14, Math.min(28, 14+(totalByAgent[a]/maxTotal)*14))
    }));

    const links = [];
    const maxEdge = Math.max(1, ...Object.values(p.edges));
    for (const [key, count] of Object.entries(p.edges)) {
      const [src, tgt] = key.split("->");
      links.push({ source: src, target: tgt, count,
        width: Math.max(1, (count/maxEdge)*5) });
    }

    const sim = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(d=>d.id).distance(90))
      .force("charge", d3.forceManyBody().strength(-180))
      .force("center", d3.forceCenter(width/2, height/2))
      .force("collision", d3.forceCollide().radius(d=>d.r+8));

    const link = svg.selectAll(".link").data(links).enter()
      .append("line")
      .attr("stroke", var_red).attr("stroke-opacity", 0.3)
      .attr("stroke-width", d=>d.width)
      .attr("marker-end", "url(#arrow)");

    const node = svg.selectAll(".node").data(nodes).enter()
      .append("g").attr("class", "graph-node")
      .call(d3.drag()
        .on("start", (e,d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
        .on("drag", (e,d) => { d.fx=e.x; d.fy=e.y; })
        .on("end", (e,d) => { if (!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
      );

    node.append("circle").attr("r", d=>d.r)
      .attr("fill", "rgba(139,0,0,0.08)")
      .attr("stroke", var_red).attr("stroke-width", 1.5);
    node.append("text").attr("dy", "0.35em")
      .attr("text-anchor", "middle").text(d=>d.id);

    sim.on("tick", () => {
      link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
        .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
      node.attr("transform", d=>`translate(${d.x},${d.y})`);
    });
  }

  // ── Table ──
  let sortCol = "agent", sortAsc = true;
  function renderTable() {
    const p = parsedTrace;
    const cols = [
      {key:"agent",label:"Agent"},{key:"sends",label:"Sends"},
      {key:"receives",label:"Receives"},{key:"broadcasts",label:"Broadcasts"},
      {key:"dropped",label:"Dropped"},{key:"firstTs",label:"First Active"},
      {key:"lastTs",label:"Last Active"}
    ];

    const thead = document.querySelector("#agent-table thead tr");
    thead.innerHTML = cols.map(c => {
      const arrow = sortCol===c.key ? (sortAsc?" ▲":" ▼") : "";
      return `<th data-col="${c.key}">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
    }).join("");

    let rows = p.agents.map(a => {
      const s = p.agentStats[a];
      return {agent:a,...s};
    });
    rows.sort((a,b) => {
      let va=a[sortCol], vb=b[sortCol];
      if (typeof va==="string") { va=va.toLowerCase(); vb=vb.toLowerCase(); }
      return (va<vb?-1:va>vb?1:0) * (sortAsc?1:-1);
    });

    document.querySelector("#agent-table tbody").innerHTML = rows.map(r =>
      `<tr>
        <td style="font-weight:600;color:var(--text)">${r.agent}</td>
        <td style="color:var(--green)">${r.sends}</td>
        <td style="color:var(--blue)">${r.receives}</td>
        <td style="color:#7c3aed">${r.broadcasts}</td>
        <td style="color:${r.dropped>0?'var(--red)':'var(--text-muted)'}">${r.dropped}</td>
        <td>${r.firstTs}</td><td>${r.lastTs}</td>
      </tr>`
    ).join("");

    thead.querySelectorAll("th").forEach(th => {
      th.addEventListener("click", () => {
        const c = th.dataset.col;
        if (sortCol===c) sortAsc=!sortAsc;
        else { sortCol=c; sortAsc=true; }
        renderTable();
      });
    });
  }

  // ── Metrics ──
  function renderMetrics() {
    const p = parsedTrace;
    const p50 = percentile(p.latencies, 0.5);
    const p95 = percentile(p.latencies, 0.95);
    const p99 = percentile(p.latencies, 0.99);

    const metrics = [
      { title:"Success Rate", value:(p.successRate*100).toFixed(1)+"%",
        color: p.successRate>=0.9?"var(--green)":p.successRate>=0.7?"var(--gold)":"var(--red)",
        detail:`${p.deliveredMessages} of ${p.totalMessages} delivered` },
      { title:"Mean Latency", value:p.meanLatency.toFixed(2)+" ticks",
        color:"var(--text)", detail:`${p.latencies.length} correlated pairs` },
      { title:"Latency P50 / P95 / P99",
        value:p50.toFixed(2)+" / "+p95.toFixed(2)+" / "+p99.toFixed(2),
        color:"var(--text-secondary)", detail:"Percentile latencies in ticks" },
      { title:"Throughput", value:p.throughput.toFixed(2)+" msg/tick",
        color:"var(--text)", detail:`${p.totalMessages} msgs over ${p.duration.toFixed(1)} ticks` },
      { title:"Dropped", value:String(p.dropped),
        color: p.dropped===0?"var(--green)":"var(--red)",
        detail: p.dropped===0?"No drops":`${(p.dropped/Math.max(1,p.totalMessages)*100).toFixed(1)}% loss` },
      { title:"Overall Score", value:p.score+"/100",
        color: p.score>=80?"var(--green)":p.score>=50?"var(--gold)":"var(--red)",
        detail:"Composite of success rate, latency, throughput, and drops" }
    ];

    document.getElementById("metrics-grid").innerHTML = metrics.map(m =>
      `<div class="metric-card">
        <div class="metric-title">${m.title}</div>
        <div class="metric-value" style="color:${m.color}">${m.value}</div>
        <div class="metric-detail">${m.detail}</div>
      </div>`
    ).join("");
  }

  // ── Benchmark ──
  function renderBenchmark() {
    const section = document.getElementById("benchmark-section");
    const p = parsedTrace;
    if (!p) return;

    const grade = p.score>=90?"A":p.score>=80?"B":p.score>=70?"C":p.score>=50?"D":"F";
    const gradeColor = p.score>=70?"var(--green)":p.score>=50?"var(--gold)":"var(--red)";

    let compareHtml = "";
    if (allRuns.length >= 2) {
      const prev = allRuns[allRuns.length - 2];
      const curr = p;
      const diff = (a,b,higher) => {
        const d = a - b;
        if (Math.abs(d)<0.001) return "";
        const better = higher ? d>0 : d<0;
        const cls = better?"compare-better":"compare-worse";
        const sign = d>0?"+":"";
        return ` <span class="${cls}">(${sign}${d.toFixed(2)})</span>`;
      };
      compareHtml = `
        <div style="margin-top:24px">
          <h3 style="font-size:14px;font-weight:700;margin-bottom:12px">
            Compare: ${curr.filename} vs ${prev.filename}
          </h3>
          <div class="compare-grid">
            <div class="compare-card">
              <h4>Performance</h4>
              <div class="compare-row"><span class="compare-label">Score</span>
                <span class="compare-value">${curr.score} vs ${prev.score}${diff(curr.score,prev.score,true)}</span></div>
              <div class="compare-row"><span class="compare-label">Success Rate</span>
                <span class="compare-value">${(curr.successRate*100).toFixed(1)}% vs ${(prev.successRate*100).toFixed(1)}%${diff(curr.successRate,prev.successRate,true)}</span></div>
              <div class="compare-row"><span class="compare-label">Throughput</span>
                <span class="compare-value">${curr.throughput.toFixed(2)} vs ${prev.throughput.toFixed(2)}${diff(curr.throughput,prev.throughput,true)}</span></div>
            </div>
            <div class="compare-card">
              <h4>Reliability</h4>
              <div class="compare-row"><span class="compare-label">Mean Latency</span>
                <span class="compare-value">${curr.meanLatency.toFixed(2)} vs ${prev.meanLatency.toFixed(2)}${diff(curr.meanLatency,prev.meanLatency,false)}</span></div>
              <div class="compare-row"><span class="compare-label">Dropped</span>
                <span class="compare-value">${curr.dropped} vs ${prev.dropped}${diff(curr.dropped,prev.dropped,false)}</span></div>
              <div class="compare-row"><span class="compare-label">Agents</span>
                <span class="compare-value">${curr.agents.length} vs ${prev.agents.length}</span></div>
            </div>
          </div>
        </div>`;
    }

    section.innerHTML = `
      <div class="benchmark-header">
        <h3>Benchmark Report</h3>
        <div class="benchmark-actions">
          <button class="btn-sm" onclick="document.getElementById('file-input').click()">
            + Load Another Trace
          </button>
        </div>
      </div>
      <div class="metrics-grid">
        <div class="metric-card" style="border-left:4px solid ${gradeColor}">
          <div class="metric-title">Overall Grade</div>
          <div class="metric-value" style="color:${gradeColor};font-size:48px">${grade}</div>
          <div class="metric-detail">Score: ${p.score}/100</div>
        </div>
        <div class="metric-card">
          <div class="metric-title">Success Rate</div>
          <div class="metric-value">${(p.successRate*100).toFixed(1)}%</div>
          <div class="score-bar-bg"><div class="score-bar" style="width:${p.successRate*100}%"></div></div>
        </div>
        <div class="metric-card">
          <div class="metric-title">Throughput</div>
          <div class="metric-value">${p.throughput.toFixed(2)}</div>
          <div class="metric-detail">messages per tick</div>
        </div>
        <div class="metric-card">
          <div class="metric-title">Latency</div>
          <div class="metric-value">${p.meanLatency.toFixed(2)}t</div>
          <div class="metric-detail">mean | P95: ${percentile(p.latencies,0.95).toFixed(2)}t</div>
        </div>
        <div class="metric-card">
          <div class="metric-title">Reliability</div>
          <div class="metric-value">${p.dropped===0?'100%':((1-p.dropped/Math.max(1,p.totalMessages))*100).toFixed(1)+'%'}</div>
          <div class="metric-detail">${p.dropped} messages dropped</div>
        </div>
        <div class="metric-card">
          <div class="metric-title">Scale</div>
          <div class="metric-value">${p.agents.length}</div>
          <div class="metric-detail">agents over ${p.duration.toFixed(0)} ticks</div>
        </div>
      </div>
      ${compareHtml}`;
  }

  // ── Leaderboard ──
  function renderLeaderboard() {
    const section = document.getElementById("leaderboard-section");
    if (!allRuns.length) return;

    const sorted = [...allRuns].sort((a,b) => b.score - a.score);
    const maxScore = Math.max(1, sorted[0].score);

    const rows = sorted.map((run, i) => {
      const rank = i + 1;
      const rankCls = rank<=3 ? `rank-${rank}` : "rank-other";
      const badge = run.score>=80?"badge-pass":run.score>=50?"badge-warn":"badge-fail";
      const badgeText = run.score>=80?"PASS":run.score>=50?"WARN":"FAIL";
      const ts = run.timestamp ? new Date(run.timestamp).toLocaleString() : "";

      return `<tr>
        <td><span class="rank-badge ${rankCls}">${rank}</span></td>
        <td>
          <div class="run-name">${run.filename}</div>
          <div class="run-meta">${run.agents.length} agents · ${run.events.length} events · ${ts}</div>
        </td>
        <td style="font-weight:700;font-size:16px">${run.score}</td>
        <td style="min-width:120px">
          <div class="score-bar-bg"><div class="score-bar" style="width:${(run.score/maxScore)*100}%"></div></div>
        </td>
        <td>${(run.successRate*100).toFixed(1)}%</td>
        <td>${run.meanLatency.toFixed(2)}t</td>
        <td>${run.throughput.toFixed(2)}</td>
        <td>${run.dropped}</td>
        <td><span class="badge ${badge}">${badgeText}</span></td>
      </tr>`;
    }).join("");

    section.innerHTML = `
      <div class="benchmark-header">
        <h3>Leaderboard</h3>
        <div class="benchmark-actions">
          <button class="btn-sm" onclick="document.getElementById('file-input').click()">
            + Add Run
          </button>
          <button class="btn-sm" id="export-btn">Export CSV</button>
        </div>
      </div>
      <div class="panel-box">
        <div class="table-wrapper">
          <table class="leaderboard-table">
            <thead><tr>
              <th style="width:50px">Rank</th>
              <th>Run</th>
              <th>Score</th>
              <th style="min-width:120px"></th>
              <th>Success</th>
              <th>Latency</th>
              <th>Throughput</th>
              <th>Dropped</th>
              <th>Status</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
      <div style="margin-top:12px;font-size:12px;color:var(--text-muted)">
        ${allRuns.length} run${allRuns.length>1?"s":""} loaded ·
        Load multiple trace files to compare and rank
      </div>`;

    const exportBtn = document.getElementById("export-btn");
    if (exportBtn) exportBtn.addEventListener("click", exportCSV);
  }

  function exportCSV() {
    const header = "rank,filename,score,success_rate,mean_latency,throughput,dropped,agents,events\n";
    const sorted = [...allRuns].sort((a,b) => b.score - a.score);
    const rows = sorted.map((r,i) =>
      `${i+1},"${r.filename}",${r.score},${(r.successRate*100).toFixed(1)},${r.meanLatency.toFixed(2)},${r.throughput.toFixed(2)},${r.dropped},${r.agents.length},${r.events.length}`
    ).join("\n");
    const blob = new Blob([header + rows], {type: "text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "nest-leaderboard.csv";
    a.click();
  }

  // ── Tab switching ──
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById("panel-" + tab.dataset.tab).classList.add("active");
      if (tab.dataset.tab === "graph" && parsedTrace) renderGraph();
    });
  });

  window.__nestLoadTrace = parseAndRender;
})();
</script>
</body>
</html>
